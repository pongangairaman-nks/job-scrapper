name: Daily Job Scraper

on:
  schedule:
    # 3:30 AM UTC = 9:00 AM IST
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run scraper (headless)
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python backend/main.py --headless

      # Optional: also trigger the live API so the dashboard stays updated
      - name: Ping live API scrape endpoint
        if: ${{ vars.BACKEND_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.BACKEND_URL }}/scrape" \
            -H "Content-Type: application/json" \
            --max-time 120 || true
