services:
  # --- Backend API ---
  - type: web
    name: job-scraper-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  # --- Frontend static site ---
  - type: web
    name: job-scraper-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false        # you'll paste the backend URL here after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
